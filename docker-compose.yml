services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${PHOTOTAG_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    volumes:
      - phototag-data:/app/data
      # Mount your photo directories here (read-only).
      # Scan "/photos" from the Settings page in the UI.
      - ${PHOTOTAG_PHOTOS_DIR:-./data}:/photos:ro
    environment:
      - PHOTOTAG_DATA_DIR=/app/data
      - PHOTOTAG_DB_PATH=/app/data/phototag.db
      - PHOTOTAG_CHROMADB_PATH=/app/data/chromadb
      - PHOTOTAG_THUMBNAIL_DIR=/app/data/thumbnails
      - PHOTOTAG_OLLAMA_BASE_URL=http://ollama:11434
      - PHOTOTAG_FRONTEND_URL=http://localhost
      - PHOTOTAG_CLIP_DEVICE=${PHOTOTAG_CLIP_DEVICE:-cpu}
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  phototag-data:
  ollama-data:
