# GPU override -- enables NVIDIA GPU access for CLIP and Ollama.
# Requires the NVIDIA Container Toolkit on the host.
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  backend:
    environment:
      - PHOTOTAG_CLIP_DEVICE=auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
